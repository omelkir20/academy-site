networks:
  learning-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
  n8n-data:

services:
  # ─── Datastores ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: learning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_secret}
      POSTGRES_DB: ${POSTGRES_DB:-learning_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - learning-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learning} -d ${POSTGRES_DB:-learning_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: learning-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-learning}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-learning_secret}
      MONGO_INITDB_DATABASE: users_db
    volumes:
      - mongo-data:/data/db
      - ./mongodb/init-users.js:/docker-entrypoint-initdb.d/init-users.js:ro
    ports:
      - "27017:27017"
    networks:
      - learning-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learning-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - learning-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: learning-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin_secret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - learning-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Microservices ─────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: learning-user-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_USER:-learning}:${MONGO_PASSWORD:-learning_secret}@mongodb:27017/users_db?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "3001:3001"
    networks:
      - learning-net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: learning-course-service
    restart: unless-stopped
    environment:
      # FIX: asyncpg requires the postgresql+asyncpg:// scheme
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-learning}:${POSTGRES_PASSWORD:-learning_secret}@postgres:5432/${POSTGRES_DB:-learning_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin_secret}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
    ports:
      - "8001:8001"
    networks:
      - learning-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: learning-analytics-service
    restart: unless-stopped
    environment:
      # FIX: asyncpg requires the postgresql+asyncpg:// scheme
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-learning}:${POSTGRES_PASSWORD:-learning_secret}@postgres:5432/${POSTGRES_DB:-learning_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
    ports:
      - "8002:8002"
    networks:
      - learning-net
    depends_on:
      postgres:
        condition: service_healthy

  ai-tutor-service:
    build:
      context: ./ai-tutor-service
      dockerfile: Dockerfile
    container_name: learning-ai-tutor-service
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      COURSE_SERVICE_URL: http://course-service:8001
    ports:
      - "8003:8003"
    networks:
      - learning-net
    depends_on:
      redis:
        condition: service_healthy

  n8n-automation:
    image: n8nio/n8n:latest
    container_name: learning-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin_secret}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-learning_db}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-learning}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-learning_secret}
      DB_POSTGRESDB_SCHEMA: n8n
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n-automation/workflows:/home/node/.n8n/workflows
    ports:
      - "5678:5678"
    networks:
      - learning-net
    depends_on:
      postgres:
        condition: service_healthy

  learning-frontend:
    build:
      context: ./learning-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    container_name: learning-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    ports:
      - "3000:3000"
    networks:
      - learning-net
    depends_on:
      - user-service
      - course-service

  # ─── API Gateway ────────────────────────────────────────────────────────────

  nginx-gateway:
    build:
      context: ./nginx-gateway
      dockerfile: Dockerfile
    container_name: learning-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - learning-net
    depends_on:
      - learning-frontend
      - user-service
      - course-service
      - analytics-service
      - ai-tutor-service
